name: Office Worker Auto Commit Bot

on:
  schedule:
    - cron: '0 0,12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main 
          fetch-depth: 0 

      - name: Xử lý tỷ lệ 50% và Commit ngẫu nhiên
        run: |
          CHANCE=$(( $RANDOM % 100 ))
          
          if [ $CHANCE -lt 50 ]; then
            echo "Tuyệt vời! Quay vào ô 50% thành công. Số quay được là: $CHANCE"
            
            MESSAGES=(
              "Cập nhật tài liệu README.md"
              "Sửa một lỗi hiển thị nhỏ (bug fix)"
              "Tối ưu hóa hiệu suất mã nguồn"
              "Thêm ghi chú (comments) cho code dễ hiểu hơn"
              "Dọn dẹp code thừa (refactoring)"
              "Cập nhật cấu hình dự án"
              "Sửa lỗi đánh máy trong tài liệu"
            )
            
            RANDOM_INDEX=$(( $RANDOM % ${#MESSAGES[@]} ))
            COMMIT_MSG=${MESSAGES[$RANDOM_INDEX]}
            
            git config --global user.name "GitHub Action Bot"
            git config --global user.email "action@github.com"
            
            git pull origin main
            
            echo "Commit lúc $(date) - Nội dung: $COMMIT_MSG" >> auto-commit-log.txt
            
            git add auto-commit-log.txt
            git commit -m "$COMMIT_MSG"
            git push origin main
            
          else
            echo "Hôm nay nhẹ nhàng, không commit. Số quay được là: $CHANCE"
          fi
