name: Office Worker Auto Commit Bot

on:
  schedule:
    - cron: '0 0,12 * * 1-5'
  workflow_dispatch:

# THÊM MỚI: Cấp quyền ghi (write) cho bot để nó có thể push code lên kho lưu trữ
permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      # CẬP NHẬT: Nâng cấp lên v4 để sửa cảnh báo màu vàng
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Xử lý tỷ lệ 40% và Commit ngẫu nhiên
        run: |
          CHANCE=$(( $RANDOM % 100 ))
          
          if [ $CHANCE -lt 40 ]; then
            echo "Tuyệt vời! Quay vào ô 40% thành công. Số quay được là: $CHANCE"
            
            MESSAGES=(
              "Cập nhật tài liệu README.md"
              "Sửa một lỗi hiển thị nhỏ (bug fix)"
              "Tối ưu hóa hiệu suất mã nguồn"
              "Thêm ghi chú (comments) cho code dễ hiểu hơn"
              "Dọn dẹp code thừa (refactoring)"
              "Cập nhật cấu hình dự án"
              "Sửa lỗi đánh máy trong tài liệu"
            )
            
            RANDOM_INDEX=$(( $RANDOM % ${#MESSAGES[@]} ))
            COMMIT_MSG=${MESSAGES[$RANDOM_INDEX]}
            
            echo "Commit lúc $(date) - Nội dung: $COMMIT_MSG" >> auto-commit-log.txt
            
            git config --global user.name "GitHub Action Bot"
            git config --global user.email "action@github.com"
            
            git add auto-commit-log.txt
            git commit -m "$COMMIT_MSG"
            git push
            
          else
            echo "Hôm nay nhẹ nhàng, không commit. Số quay được là: $CHANCE"
          fi
